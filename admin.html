<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ek' Balam Admin - Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 15px; }
        .product-card { background: var(--card-bg); border: 1px solid var(--glass); border-radius: 15px; padding: 10px; text-align: center; }
        #atleta-section table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        #atleta-section th { color: #00d4ff; text-transform: uppercase; padding: 10px; font-size: 0.8rem; }
        .atleta-row { background: rgba(255, 255, 255, 0.05); transition: 0.3s; }
        .atleta-row td { padding: 15px 10px; text-align: center; color: #fff; border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .atleta-row td:first-child { border-left: 3px solid #00d4ff; border-radius: 10px 0 0 10px; font-weight: bold; color: #00d4ff; }
        .col-nombre { font-weight: bold; text-align: left !important; }
        .col-visitas { color: #ff00ff !important; font-weight: bold; }
        .vencido-critico { background: rgba(255, 49, 49, 0.2) !important; color: #ff3131 !important; animation: danger-pulse 1s infinite; }
        @keyframes danger-pulse { 50% { opacity: 0.8; } }
        .img-atleta { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #00d4ff; vertical-align: middle; margin-right: 10px; }
        .search-bar { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 10px; border: 1px solid #00d4ff; background: rgba(0,0,0,0.5); color: white; font-family: 'Rajdhani'; }
        
        .cumple-anim { font-size: 1.2rem; display: inline-block; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }

        .btn-ws { background: #25d366; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-renew { background: #f39c12; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-right: 5px; }
        .btn-delete { background: #ff3131; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-edit { background: #00d4ff; color: black; border: none; padding: 5px 8px; border-radius: 5px; cursor: pointer; margin-right: 5px; }
        .price-config-grid { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .price-item { display: flex; flex-direction: column; gap: 5px; font-size: 0.8rem; }
        .price-item input { width: 70px; padding: 5px; border-radius: 5px; border: 1px solid #00d4ff; background: rgba(0,0,0,0.3); color: white; text-align: center; }

        /* Estilos para el Historial de Caja */
        .historial-caja { margin-top: 20px; max-height: 300px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; }
        .historial-caja table { width: 100%; font-size: 0.85rem; border-collapse: collapse; }
        .historial-caja th { text-align: left; border-bottom: 1px solid var(--glass); padding: 5px; color: #00d4ff; }
        .historial-caja td { padding: 8px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="logo-area">
            <img src="logo.jpg" alt="Ek Balam" style="width:70px; border-radius:50%">
            <h1 class="neon-text">EK' BALAM</h1>
            <span>Admin Panel</span>
        </div>
        <button class="nav-btn" onclick="showSection('atleta-section')">👥 Atletas</button>
        <button class="nav-btn" onclick="openModal('modal-inscripcion')">➕ Inscripción</button>
        <button class="nav-btn" onclick="showSection('ventas-section')">🛒 Tienda</button>
        <button class="nav-btn" onclick="showSection('inventario-section')">📦 Inventario</button>
        <button class="nav-btn" onclick="showSection('corte-section')">💰 Caja</button>
    </nav>

    <main class="main-content">
        <section id="atleta-section" class="glass-card">
            <h3>Atletas Activos</h3>
            <input type="text" id="inputBusqueda" class="search-bar" placeholder="🔍 Buscar por nombre o ID..." onkeyup="filtrarAtletas()">
            <table>
                <thead>
                    <tr><th>Foto</th><th>ID</th><th>Nombre</th><th>Vence</th><th>Visitas</th><th>Gestión</th></tr>
                </thead>
                <tbody id="listaAtletasBody"></tbody>
            </table>
        </section>

        <section id="corte-section" class="glass-card" style="display:none;">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <h3>💰 Control de Caja</h3>
                <button class="btn-ws" style="background:#1d6f42;" onclick="descargarReporteExcel()">📊 Reporte Excel</button>
            </div>
            <div class="stats-container" style="display:flex; gap:15px;">
                <div class="stat-card"><h4>Hoy</h4><p id="corteDia" style="color:#39ff14; font-size:1.8rem;">$0</p><small id="detallesHoy"></small></div>
                <div class="stat-card"><h4>Mes</h4><p id="corteMes" style="color:#00d4ff; font-size:1.8rem;">$0</p><small id="detallesMes"></small></div>
            </div>

            <div style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                <h4>📜 Historial de Registros (Mes Actual)</h4>
                <div class="historial-caja">
                    <table>
                        <thead>
                            <tr><th>Fecha</th><th>Concepto</th><th>Monto</th><th>Método</th></tr>
                        </thead>
                        <tbody id="historialCajaBody"></tbody>
                    </table>
                </div>
            </div>

            <div style="margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;">
                <h4>⚙️ Ajuste de Costos de Membresía</h4>
                <div class="price-config-grid">
                    <div class="price-item"><label>Visita</label><input type="number" id="confPrecioVis" value="60"></div>
                    <div class="price-item"><label>Semana</label><input type="number" id="confPrecioSem" value="250"></div>
                    <div class="price-item"><label>Quincena</label><input type="number" id="confPrecioQuin" value="350"></div>
                    <div class="price-item"><label>21 Días</label><input type="number" id="confPrecio21" value="450"></div>
                    <div class="price-item"><label>Mes</label><input type="number" id="confPrecioMes" value="550"></div>
                </div>
            </div>
        </section>
        
        <section id="inventario-section" class="glass-card" style="display:none;">
             <div style="display:flex; justify-content: space-between; align-items: center;">
                <h3>📦 Inventario</h3>
                <button class="btn-confirmar" onclick="openModal('modal-producto')">+ Nuevo Producto</button>
            </div>
            <table><tbody id="inventarioBody"></tbody></table>
        </section>
        <section id="ventas-section" class="glass-card" style="display:none;">
            <h3>🛒 Tienda</h3>
            <div class="product-grid" id="gridVentas"></div>
        </section>
    </main>

    <div id="modal-inscripcion" class="modal">
        <div class="modal-content">
            <h3>Nueva Inscripción</h3>
            <input type="text" id="fotoAtleta" placeholder="URL Foto Atleta">
            <input type="text" id="nomAtleta" placeholder="Nombre completo">
            <input type="tel" id="telAtleta" placeholder="WhatsApp">
            <label>Cumpleaños:</label>
            <input type="date" id="cumpleAtleta">
            <hr style="border:0; border-top:1px solid var(--glass); margin:10px 0; width:100%">
            <label style="color: #f39c12; font-size: 0.8rem;">Vencimiento Manual (Migraciones):</label>
            <input type="date" id="venceManual">
            <select id="planMembrecia">
                <option value="1">Visita</option>
                <option value="7">Semanal</option>
                <option value="15">Quincenal</option>
                <option value="21">21 Días</option>
                <option value="30" selected>Mensual</option>
                <option value="0">Migración (Sin costo)</option>
            </select>
            <select id="metodoInscripcion">
                <option value="Efectivo">Efectivo</option>
                <option value="Transferencia">Transferencia</option>
            </select>
            <button class="btn-confirmar" onclick="registrarAtleta()">REGISTRAR Y TICKET</button>
            <button class="btn-cancelar" onclick="closeModal('modal-inscripcion')">CERRAR</button>
        </div>
    </div>

    <div id="modal-renovar" class="modal">
        <div class="modal-content">
            <h3>Renovar Membresía</h3>
            <p id="renovarNombre" style="color:#00d4ff; font-weight:bold;"></p>
            <input type="hidden" id="renovarId"><input type="hidden" id="renovarTel">
            <select id="planRenovacion">
                <option value="1">Visita</option>
                <option value="7">Semanal</option>
                <option value="15">Quincenal</option>
                <option value="21">21 Días</option>
                <option value="30">Mensual</option>
            </select>
            <select id="metodoRenovacion">
                <option value="Efectivo">Efectivo</option>
                <option value="Transferencia">Transferencia</option>
            </select>
            <button class="btn-confirmar" onclick="procesarRenovacion()">RENOVAR Y TICKET</button>
            <button class="btn-cancelar" onclick="closeModal('modal-renovar')">CERRAR</button>
        </div>
    </div>

    <div id="modal-editar-atleta" class="modal">
        <div class="modal-content">
            <h3>Editar Datos de Atleta</h3>
            <input type="hidden" id="editId">
            <label>Nombre:</label>
            <input type="text" id="editNombre">
            <label>WhatsApp:</label>
            <input type="tel" id="editTel">
            <label>Asistencias (Fuego):</label>
            <input type="number" id="editAsistencias">
            <label>URL Foto:</label>
            <input type="text" id="editFoto">
            <button class="btn-confirmar" onclick="guardarEdicionAtleta()">GUARDAR CAMBIOS</button>
            <button class="btn-cancelar" onclick="closeModal('modal-editar-atleta')">CANCELAR</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, addDoc, getDocs, updateDoc, deleteDoc, increment, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import * as XLSX from 'https://cdn.sheetjs.com/xlsx-0.20.1/package/xlsx.mjs';

        const firebaseConfig = {
            apiKey: "AIzaSyArDuJ0_9r1ZY3OB-CGJMZMO3aAwSkM4vU",
            authDomain: "ekbalamsystem.firebaseapp.com",
            projectId: "ekbalamsystem",
            storageBucket: "ekbalamsystem.firebasestorage.app",
            messagingSenderId: "426577244386",
            appId: "1:426577244386:web:3b0c038675f6724fd7eebb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- FUNCIONES GLOBALES ---
        window.enviarWS = (tel, msg) => {
            const url = `https://api.whatsapp.com/send?phone=52${tel}&text=${encodeURIComponent(msg)}`;
            window.open(url, '_blank');
        };

        window.avisarVencimiento = (nom, tel, d) => {
            const msg = `Hola ${nom}, te quedan ${d} días de membresía. ¡Te esperamos! 🐆`;
            window.enviarWS(tel, msg);
        };

        window.getPreciosConfig = () => ({
            "0": 0, "1": parseFloat(document.getElementById('confPrecioVis').value),
            "7": parseFloat(document.getElementById('confPrecioSem').value),
            "15": parseFloat(document.getElementById('confPrecioQuin').value),
            "21": parseFloat(document.getElementById('confPrecio21').value),
            "30": parseFloat(document.getElementById('confPrecioMes').value)
        });

        const getPlanTexto = (d) => ({ "1":"Visita", "7":"Semanal", "15":"Quincenal", "21":"21 Días", "30":"Mensual", "0":"Migración" }[d]);

        // --- RENDERIZADO ATLETAS ---
        onSnapshot(collection(db, "clientes"), (snap) => {
            const tbody = document.getElementById('listaAtletasBody');
            tbody.innerHTML = ""; const hoy = new Date();
            snap.forEach(ds => {
                const d = ds.data(); const v = d.fechaVencimiento.toDate();
                const diff = Math.ceil((v - hoy) / (1000*60*60*24));
                const foto = d.foto || 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png';
                let cumpleIco = "";
                if(d.cumple) {
                    const p = d.cumple.split('-');
                    if(parseInt(p[2]) === hoy.getDate() && (parseInt(p[1])-1) === hoy.getMonth()) cumpleIco = "<span class='cumple-anim'>🎂</span> ";
                }
                tbody.innerHTML += `
                    <tr class="atleta-row" data-id="${d.id}" data-plan="${d.planId}" data-vence="${v.toISOString()}">
                        <td><img src="${foto}" class="img-atleta"></td>
                        <td>${d.id}</td>
                        <td class="col-nombre">${cumpleIco}${d.nombre}</td>
                        <td class="${diff <= 0 ? 'vencido-critico' : ''}">${diff > 0 ? diff + "d" : "VENCIDO"}</td>
                        <td class="col-visitas">${d.asistencias || 0} 🔥</td>
                        <td>
                            <button class="btn-ws" onclick="avisarVencimiento('${d.nombre}','${d.telefono}',${diff})">AVISAR</button>
                            <button class="btn-renew" onclick="abrirRenovacion('${d.id}','${d.nombre}','${d.telefono}')">RENOVAR</button>
                            <button class="btn-edit" onclick="abrirEditorAtleta('${d.id}','${d.nombre}','${d.telefono}',${d.asistencias || 0},'${d.foto || ''}')">✎</button>
                            <button class="btn-delete" onclick="eliminarAtleta('${d.id}')">✖</button>
                        </td>
                    </tr>`;
            });
        });

        // --- FUNCIONES DE EDICIÓN (NUEVAS) ---
        window.abrirEditorAtleta = (id, nombre, tel, asistencias, foto) => {
            document.getElementById('editId').value = id;
            document.getElementById('editNombre').value = nombre;
            document.getElementById('editTel').value = tel;
            document.getElementById('editAsistencias').value = asistencias;
            document.getElementById('editFoto').value = foto;
            openModal('modal-editar-atleta');
        };

        window.guardarEdicionAtleta = async () => {
            const id = document.getElementById('editId').value;
            const nuevoDato = {
                nombre: document.getElementById('editNombre').value.toUpperCase(),
                telefono: document.getElementById('editTel').value,
                asistencias: parseInt(document.getElementById('editAsistencias').value),
                foto: document.getElementById('editFoto').value
            };
            try {
                await updateDoc(doc(db, "clientes", id), nuevoDato);
                alert("✅ Datos actualizados correctamente.");
                closeModal('modal-editar-atleta');
            } catch (e) {
                alert("Error al actualizar.");
            }
        };

        // --- REGISTRO ---
        window.registrarAtleta = async () => {
            const nom = document.getElementById('nomAtleta').value.toUpperCase();
            const tel = document.getElementById('telAtleta').value;
            const dias = document.getElementById('planMembrecia').value;
            const met = document.getElementById('metodoInscripcion').value;
            const manual = document.getElementById('venceManual').value;
            const precios = window.getPreciosConfig();
            const id = "EB-" + Math.floor(1000 + Math.random() * 9000);
            let vence = new Date();
            if(manual) { vence = new Date(manual); vence.setMinutes(vence.getMinutes() + vence.getTimezoneOffset()); }
            else { vence.setDate(vence.getDate() + parseInt(dias)); }
            await setDoc(doc(db, "clientes", id), { 
                id, nombre: nom, telefono: tel, foto: document.getElementById('fotoAtleta').value,
                cumple: document.getElementById('cumpleAtleta').value, fechaVencimiento: vence, asistencias: 0, planId: dias 
            });
            if(precios[dias] > 0) {
                await addDoc(collection(db, "finanzas"), { concepto: `Inscripción: ${nom}`, monto: precios[dias], metodo: met, fecha: new Date() });
            }
            const ticket = `*EK' BALAM CROSS TRAINING* 🐆\n*TICKET DE INSCRIPCIÓN*\nID: ${id}\nAtleta: ${nom}\nPlan: ${getPlanTexto(dias)}\nVence: ${vence.toLocaleDateString()}\nPago: $${precios[dias]}\n¡Bienvenido!`;
            window.enviarWS(tel, ticket);
            closeModal('modal-inscripcion');
        };

        // --- RENOVACIÓN ---
        window.procesarRenovacion = async () => {
            const id = document.getElementById('renovarId').value;
            const dias = document.getElementById('planRenovacion').value;
            const met = document.getElementById('metodoRenovacion').value;
            const nom = document.getElementById('renovarNombre').innerText;
            const tel = document.getElementById('renovarTel').value;
            const precios = window.getPreciosConfig();
            let vence = new Date(); vence.setDate(vence.getDate() + parseInt(dias));
            await updateDoc(doc(db, "clientes", id), { fechaVencimiento: vence, planId: dias });
            await addDoc(collection(db, "finanzas"), { concepto: `Renovación: ${nom}`, monto: precios[dias], metodo: met, fecha: new Date() });
            const ticket = `*EK' BALAM CROSS TRAINING* 🐆\n*TICKET DE RENOVACIÓN*\nID: ${id}\nAtleta: ${nom}\nPlan: ${getPlanTexto(dias)}\nVence: ${vence.toLocaleDateString()}\nPago: $${precios[dias]}`;
            window.enviarWS(tel, ticket);
            closeModal('modal-renovar');
        };

        // --- CAJA E HISTORIAL ---
        onSnapshot(query(collection(db, "finanzas"), orderBy("fecha", "desc")), (snap) => {
            let hoyE = 0, hoyT = 0, mesE = 0, mesT = 0;
            const ahora = new Date();
            const historialBody = document.getElementById('historialCajaBody');
            historialBody.innerHTML = "";

            snap.forEach(docSnap => {
                const f = docSnap.data();
                const fF = f.fecha.toDate();
                
                if(fF.toLocaleDateString() === ahora.toLocaleDateString()) {
                    if(f.metodo === "Efectivo") hoyE += f.monto; else hoyT += f.monto;
                }
                if(fF.getMonth() === ahora.getMonth() && fF.getFullYear() === ahora.getFullYear()) {
                    if(f.metodo === "Efectivo") mesE += f.monto; else mesT += f.monto;
                    historialBody.innerHTML += `
                        <tr>
                            <td>${fF.getDate()}/${fF.getMonth()+1}</td>
                            <td>${f.concepto}</td>
                            <td style="color:#39ff14">$${f.monto}</td>
                            <td>${f.metodo}</td>
                        </tr>`;
                }
            });
            document.getElementById('corteDia').innerText = `$${hoyE + hoyT}`;
            document.getElementById('detallesHoy').innerText = `Ef: $${hoyE} | Tr: $${hoyT}`;
            document.getElementById('corteMes').innerText = `$${mesE + mesT}`;
            document.getElementById('detallesMes').innerText = `Ef: $${mesE} | Tr: $${mesT}`;
        });

        // --- REPORTE EXCEL Y LIMPIEZA ---
        window.descargarReporteExcel = async () => {
            const snap = await getDocs(collection(db, "finanzas"));
            const ahora = new Date();
            const datosExcel = [];
            const idsABorrar = [];

            snap.forEach(docSnap => {
                const f = docSnap.data();
                const fF = f.fecha.toDate();
                if(fF.getMonth() === ahora.getMonth() && fF.getFullYear() === ahora.getFullYear()) {
                    datosExcel.push({
                        Fecha: fF.toLocaleDateString(),
                        Hora: fF.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                        Concepto: f.concepto,
                        Monto: f.monto,
                        Metodo: f.metodo
                    });
                    idsABorrar.push(docSnap.id);
                }
            });

            if(datosExcel.length === 0) return alert("Sin datos este mes");
            
            const ws = XLSX.utils.json_to_sheet(datosExcel);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Finanzas");
            XLSX.writeFile(wb, `Reporte_EkBalam_${ahora.getMonth()+1}_${ahora.getFullYear()}.xlsx`);

            setTimeout(async () => {
                if(confirm("📊 Reporte descargado.\n\n¿Deseas LIMPIAR los registros de este mes en la base de datos?")) {
                    try {
                        for (const idDoc of idsABorrar) {
                            await deleteDoc(doc(db, "finanzas", idDoc));
                        }
                        alert("✅ Caja limpiada con éxito.");
                    } catch (e) {
                        alert("Error al limpiar registros.");
                    }
                }
            }, 1500);
        };

        // --- AUXILIARES ---
        window.showSection = (id) => { document.querySelectorAll('section').forEach(s => s.style.display = 'none'); document.getElementById(id).style.display = 'block'; };
        window.openModal = (id) => document.getElementById(id).style.display = 'flex';
        window.closeModal = (id) => document.getElementById(id).style.display = 'none';
        window.abrirRenovacion = (id, nom, tel) => { document.getElementById('renovarId').value = id; document.getElementById('renovarNombre').innerText = nom; document.getElementById('renovarTel').value = tel; openModal('modal-renovar'); };
        window.eliminarAtleta = async (id) => { if(confirm("¿Borrar?")) await deleteDoc(doc(db, "clientes", id)); };
        window.filtrarAtletas = () => {
            const queryBusq = document.getElementById('inputBusqueda').value.toLowerCase();
            document.querySelectorAll('.atleta-row').forEach(f => {
                const n = f.querySelector('.col-nombre').innerText.toLowerCase();
                const id = f.dataset.id.toLowerCase();
                f.style.display = (n.includes(queryBusq) || id.includes(queryBusq)) ? "" : "none";
            });
        };
    </script>
</body>
</html>
